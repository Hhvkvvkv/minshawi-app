name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true
      
    - name: Install dependencies
      run: npm install --legacy-peer-deps
      
    - name: Generate Android project
      run: npx expo prebuild --platform android --no-install
      
    - name: Fix Kotlin version compatibility
      run: |
        # The ext.kotlinVersion in build.gradle defaults to 1.9.25 but
        # React Native's version catalog uses 1.9.24. 
        # The Compose Compiler plugin classpath uses ext.kotlinVersion (1.9.25 -> plugin 1.5.15)
        # but the actual Kotlin compiler uses the version catalog (1.9.24).
        # Fix: patch build.gradle to use 1.9.24 to match the version catalog.
        sed -i "s/kotlinVersion = findProperty('android.kotlinVersion') ?: '1.9.25'/kotlinVersion = findProperty('android.kotlinVersion') ?: '1.9.24'/" android/build.gradle
        echo "Kotlin version in build.gradle:"
        grep "kotlinVersion" android/build.gradle
        echo ""
        echo "Kotlin version in libs.versions.toml:"
        grep "^kotlin" node_modules/react-native/gradle/libs.versions.toml

    - name: Fix splash screen drawable
      run: |
        # Create a simple splash screen drawable if the reference exists but the file is missing
        mkdir -p android/app/src/main/res/drawable
        cat > android/app/src/main/res/drawable/splashscreen_logo.xml << 'XML'
        <?xml version="1.0" encoding="utf-8"?>
        <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <path
                android:fillColor="#1a1410"
                android:pathData="M0,0h108v108h-108z"/>
        </vector>
        XML
        echo "Created splashscreen_logo drawable"

    - name: Make gradlew executable
      run: chmod +x android/gradlew
      
    - name: Build APK (Debug)
      working-directory: android
      run: ./gradlew assembleDebug --no-daemon 2>&1
      
    - name: Find APK
      run: find android -name "*.apk" -type f
      
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: minshawi-app-debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: warn
